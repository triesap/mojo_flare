test-safety-asserts  = "mojo -I . tests/runtime/test_safety_asserts.mojo"             # v0.7 — bounds-check + debug_assert[assert_mode="safe"] guards on FFI substrate (run under -D ASSERT=all to exercise; see .cursor/rules/sanitizers-and-bounds-checking.mdc, ~14 tests)

# ── Sanitizer + assertion harness (see .cursor/rules/sanitizers-and-bounds-checking.mdc) ──
# tests-asserts-all: run the full functional suite with -D ASSERT=all, so
#                    every debug_assert (both assert_mode="safe" and the
#                    default flavour) compiles in. Catches O(n) invariants
#                    that the default ASSERT=safe build elides.
# tests-asan:        AOT-compile the FFI-heavy test inventory with
#                    --sanitize address (LLVM AddressSanitizer) and run
#                    each binary one at a time. JIT (`mojo run --sanitize
#                    address`) does not work because the JIT can't resolve
#                    libasan's __asan_* symbols statically.
# tests-tsan:        Same shape, but with --sanitize thread for the
#                    multicore test surfaces (scheduler / handoff / thread FFI).
tests-asserts-all = { cmd = "bash -c 'set -e; for f in tests/runtime/test_io_uring.mojo tests/runtime/test_iovec.mojo tests/runtime/test_buffer_pool.mojo tests/http/test_response_pool.mojo tests/runtime/test_date_cache.mojo tests/http/test_hpack_huffman.mojo tests/http/test_simd_parsers.mojo tests/http/test_header_phf.mojo tests/http/test_intern.mojo tests/runtime/test_safety_asserts.mojo tests/http2/test_h2_conn_handle.mojo tests/http2/test_h2_extended_connect.mojo tests/http/test_unified_http_server.mojo tests/http/test_unified_http_client.mojo tests/http2/test_h2_server_handler.mojo; do echo \"── -D ASSERT=all  $f\"; pixi run mojo -D ASSERT=all -I . \"$f\"; done'" }
