[workspace]
authors = ["ehsanmok <ehsanmok@users.noreply.github.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "flare"
platforms = ["osx-arm64", "linux-aarch64", "linux-64"]
version = "0.8.0"
preview = ["pixi-build"]

[package]
name = "flare"
version = "0.8.0"

[package.build]
backend = { name = "pixi-build-rattler-build", version = "*" }

# Binary dependencies are specified in recipe.yaml for rattler-build backend

[activation]
# Auto-build FFI wrapper libraries on environment activation (idempotent).
# Requires OpenSSL and zlib from conda-forge (declared in [dependencies])
# and, on Linux, a g++ toolchain (declared in the per-platform
# [target.*.dependencies] blocks below — macOS uses system clang++ from
# the Xcode Command Line Tools, so no conda compiler is required there).
scripts = ["flare/tls/ffi/build.sh", "flare/http/ffi/build.sh", "flare/tls/ffi/build_rustls.sh"]

# ── Base runtime dependencies (lean) ──────────────────────────────────────────
# These are everything flare itself needs at runtime — what a *user* of flare
# as a library picks up. Contributor-only tooling (docs generator, pre-commit
# hooks) lives under [feature.dev] and is opted into via `pixi install -e dev`.
[dependencies]
mojo             = "==1.0.0b1"
openssl          = ">=3.6.1,<4"    # TLS: libssl + libcrypto (SHA-1 for WS handshake)
ca-certificates  = ">=2025.1.31"   # TLS default CA bundle → $CONDA_PREFIX/ssl/cacert.pem
zlib             = ">=1.3.1,<2"    # HTTP: Content-Encoding gzip/deflate decompression
libbrotlicommon  = ">=1,<2"        # HTTP: Content-Encoding br (shared brotli tables)
libbrotlidec     = ">=1,<2"        # HTTP: brotli decoder
libbrotlienc     = ">=1,<2"        # HTTP: brotli encoder
json             = { git = "https://github.com/ehsanmok/json.git", tag = "v0.2.0" }

# g++ is a BUILD-time dep on Linux: the activation scripts
# (flare/tls/ffi/build.sh, flare/http/ffi/build.sh) invoke g++ to compile
# libflare_tls.so + libflare_zlib.so. Without it the default env cannot
# even activate on Linux. macOS intentionally uses system clang++ (no
# conda compiler) so this block is Linux-only.
[target.linux-64.dependencies]
gxx = ">=13"
sysroot_linux-64 = ">=2.34"

[target.linux-aarch64.dependencies]
gxx = ">=13"

# ── Contributor tooling (docs, formatter hook) ───────────────────────────────
# Opt in with: pixi install -e dev     (or -e fuzz / -e bench, which include
# feature.dev automatically).
[feature.dev.dependencies]
pre-commit = ">=4.2.0,<5"
mojodoc    = { git = "https://github.com/ehsanmok/mojodoc.git", branch = "main" }

# Linux-only: native debug + race-detection tooling for the io_uring
# root-causing work and the v0.8 allocation-profile pass. gdb --
# post-mortem on core dumps (no ptrace_scope dance, works on any
# unprivileged uid). valgrind -- helgrind for race detection on the
# shared kernel/userspace producer-consumer rings (PBUF_RING tail
# bumps, etc); slow but correct; also brings callgrind + massif + dhat
# for instruction-level / heap-snapshot / allocation-history profiling.
# heaptrack -- lightweight LD_PRELOAD-based malloc tracer with a much
# cheaper overhead than massif; the v0.8 pass used it to confirm the
# H1 hot path is allocation-free (171 syscalls / 600K reqs steady
# state). Conda-forge ships all three pinned to recent stable releases
# on linux-64; macOS has its own native lldb / Instruments toolchain
# so we don't need conda packages there.
[feature.dev.target.linux-64.dependencies]
gdb        = ">=14"
valgrind   = ">=3.22"
heaptrack  = ">=1.5"

[feature.fuzz.dependencies]
mozz = { git = "https://github.com/ehsanmok/mozz.git", tag = "v0.1.3" }

[feature.bench.dependencies]
# Stage 1 / Phase 1.6 — bench harness baselines.
# Pinned exact so nobody ever benchmarks against a drifting toolchain.
go      = ">=1.22,<1.25"  # Go stdlib net/http baseline
nginx   = ">=1.25,<1.29"  # 1-worker plaintext baseline
# v0.6 probe — Rust hyper / axum / actix-web baselines.
# rust meta-package ships rustc + cargo + std (conda-forge); pinned
# range matches go's >=,< discipline so pixi update can lift it
# without surprising ABI drift. h2load (HTTP/2 load generator) is
# NOT on conda-forge as a binary (only libnghttp2 is); v0.6 Step 3
# adds a benchmark/scripts/_install_h2load.sh build-from-source
# script analog to _install_wrk2.sh.
rust    = ">=1.83,<2"     # hyper / axum / actix-web build (cargo build --release --locked)

[feature.bench.target.linux-64.dependencies]
wrk = ">=4.2.0"     # conda-forge has wrk on linux-64; macOS uses system wrk
# Bench-local sysroot pin: conda-forge ``rust`` (1.94+) transitively
# pulls sysroot 2.39, but the build-script binaries rustc emits link
# against the *host* glibc rather than the conda one. Forcing the
# bench sysroot to exactly ``2.34.*`` here means every rust-built
# baseline (hyper / axum / actix-web) only references GLIBC_2.34
# and below, so the resulting binaries stay portable down to glibc
# 2.34 hosts (RHEL 9, Debian 12, Ubuntu 22.04) even though the CI
# runner itself is ``ubuntu-latest`` (24.04, glibc 2.39). The
# default linux-64 sysroot in ``[target.linux-64.dependencies]``
# above carries the same lower bound (``>=2.34``) so the
# ``libflare_tls.so`` / ``libflare_zlib.so`` the activation scripts
# build pick up the same forward-compatible floor.
sysroot_linux-64 = "2.34.*"

[feature.bench.tasks]
# ── Benchmark harness (Stage 1 / Phase 1.6) ──────────────────────────────────
# All baselines are pinned per [feature.bench.dependencies].
# Run with: pixi run --environment bench <task>
bench-vs-baseline         = "bash benchmark/scripts/bench_vs_baseline.sh"
bench-vs-baseline-quick   = "bash benchmark/scripts/bench_vs_baseline.sh --only=flare,go_nethttp --configs=throughput"
bench-h3                  = "bash benchmark/scripts/bench_h3.sh"  # Phase D Track Q7 HARD GATE -- exits with banner until h3 wiring lands
bench-integrity-only      = "bash benchmark/scripts/_integrity_check.sh"
bench-collect-env         = "bash benchmark/scripts/_collect_env.sh"

# v0.5.0 Step 1 — mixed-keepalive workload (20% Connection: close,
# 80% HTTP/1.1 keep-alive). Same five-run-median + stdev gate as
# the rest.
bench-mixed-keepalive     = "bash benchmark/scripts/bench_vs_baseline.sh --only=flare,go_nethttp --configs=mixed_keepalive"

# v0.5.0 Step 2 — wrk2 install (build from a pinned commit when
# the platform doesn't ship a binary). conda-forge has no
# pinned wrk2 for linux-64; the build-from-source script
# produces ``build/wrk2/wrk2`` from the pinned 44a94c1 release.
bench-install-wrk2        = "bash benchmark/scripts/_install_wrk2.sh"

# v0.5.0 Step 2 — tail-percentile measurement via wrk2's
# --latency mode at a fixed throughput. Run after
# ``bench-install-wrk2``. Reports p50 / p75 / p90 / p99 / p99.9
# / p99.99 / p99.999 without coordinated omission. Harness
# integration (parsing wrk2's --latency output into the per-run
# JSON files the rest of the harness writes) is a follow-up;
# this task drives wrk2 directly against a flare server bound on
# 127.0.0.1:8080 so users can read the tail percentiles from
# stdout. See benchmark/configs/tail_quick.yaml for the
# parameters.
bench-tail-quick          = "bash benchmark/scripts/_run_tail_quick.sh"

# v0.5.0 Step 3 — TLS bench setup. Generates a self-signed cert
# at build/tls-bench-certs/ for the tls_plaintext / tls_handshake
# configs to use. The server-side TlsAcceptor that drives these
# configs end-to-end lands with the v0.5.0 Step 3 reactor
# follow-up (S3.1 follow-up).
bench-tls-setup           = "bash benchmark/scripts/_make_self_signed.sh"

# ── S3.7 soak harness (slow-client / churn / mixed-load) ─────────────────────
# Three-tier model. Per-workload tasks honour SOAK_DURATION_SECS so
# the 24 h release-gate run on EPYC is the same scripts with the
# env var flipped:
#
#   smoke    — 60s/workload   (default; pixi run --environment bench bench-soak-smoke,
#                              ~3 min total)
#   extended — 300s/workload  (pixi run --environment bench bench-soak-extended,
#                              ~15 min total)
#   release  — 86400s/workload (EPYC, manual one-shot pre-tag):
#       SOAK_DURATION_SECS=86400 pixi run --environment bench bench-soak-slow-clients
#       SOAK_DURATION_SECS=86400 pixi run --environment bench bench-soak-churn
#       SOAK_DURATION_SECS=86400 pixi run --environment bench bench-soak-mixed
#
# See docs/soak.md for the gate definitions (RSS within 2x of cold-
# start, fd_count bounded, zero non-2xx) and the design-v0.5 §6.5
# release-gate framing.
bench-soak-slow-clients   = "bash benchmark/scripts/_run_soak.sh --workload=slow_clients --duration-secs=${SOAK_DURATION_SECS:-60}"
bench-soak-churn          = "bash benchmark/scripts/_run_soak.sh --workload=churn        --duration-secs=${SOAK_DURATION_SECS:-60}"
bench-soak-mixed          = "bash benchmark/scripts/_run_soak.sh --workload=mixed        --duration-secs=${SOAK_DURATION_SECS:-60}"
bench-soak-smoke          = "bash benchmark/scripts/_run_soak_smoke.sh"
bench-soak-extended       = "bash benchmark/scripts/_run_soak_extended.sh"

[feature.fuzz.tasks]
# ── Fuzzing (mozz) ────────────────────────────────────────────────────────────
# mozz is installed as a pixi dependency (feature.fuzz) and packaged as
# mozz.mojopkg into $PREFIX/lib/mojo/ — no -I flag needed.
# Run with: pixi run --environment fuzz <task>
fuzz-ws            = "mojo -I . fuzz/fuzz_ws_frame.mojo"
fuzz-pmd-context   = "mojo -I . fuzz/fuzz_permessage_deflate_context.mojo"  # v0.8 — persistent z_stream lifecycle
fuzz-url           = "mojo -I . fuzz/fuzz_url.mojo"
fuzz-headers       = "mojo -I . fuzz/fuzz_http_headers.mojo"
fuzz-http-response = "mojo -I . fuzz/fuzz_http_response.mojo"
fuzz-http-server   = "mojo -I . fuzz/fuzz_http_server.mojo"
fuzz-ws-server     = "mojo -I . fuzz/fuzz_ws_server.mojo"
prop-ws            = "mojo -I . fuzz/prop_ws_roundtrip.mojo"
prop-headers       = "mojo -I . fuzz/prop_headers.mojo"
prop-auth          = "mojo -I . fuzz/prop_auth.mojo"
fuzz-encoding      = "mojo -I . fuzz/fuzz_encoding.mojo"
fuzz-cookie        = "mojo -I . fuzz/fuzz_cookie.mojo"
fuzz-reactor-churn = "mojo -I . fuzz/fuzz_reactor_churn.mojo"
prop-timer-wheel   = "mojo -I . fuzz/prop_timer_wheel.mojo"
fuzz-server-reactor-chunks = "mojo -I . fuzz/fuzz_server_reactor_chunks.mojo"
fuzz-router-paths  = "mojo -I . fuzz/fuzz_router_paths.mojo"      # v0.4.0 — Router path matcher (200K)
fuzz-scheduler-shutdown = "mojo -I . fuzz/fuzz_scheduler_shutdown.mojo"  # v0.4.0 — scheduler runtime primitives (10K)
fuzz-extractors    = "mojo -I . fuzz/fuzz_extractors.mojo"        # v0.4.1 — typed extractors + Extracted[H] (200K)
fuzz-routes-comptime = "mojo -I . fuzz/fuzz_routes_comptime.mojo" # v0.4.1 — ComptimeRouter oracle vs runtime Router (200K)
fuzz-header-scan   = "mojo -I . fuzz/fuzz_header_scan.mojo"       # v0.4.1 — SIMD scanners vs scalar oracle (500K)
fuzz-form          = "mojo -I . fuzz/fuzz_form.mojo"              # v0.6 Track B — application/x-www-form-urlencoded (200K)
fuzz-multipart     = "mojo -I . fuzz/fuzz_multipart.mojo"         # v0.6 Track C — multipart/form-data (200K)
fuzz-session-decode = "mojo -I . fuzz/fuzz_session_decode.mojo"   # v0.6 Track E — signed cookie decoder + roundtrip (200K)
fuzz-fs-range      = "mojo -I . fuzz/fuzz_fs_range.mojo"         # v0.6 Track H — Range header parser (200K)
fuzz-h2-frame      = "mojo -I . fuzz/fuzz_h2_frame.mojo"         # v0.6 Track J — HTTP/2 frame codec (200K)
fuzz-hpack-decoder = "mojo -I . fuzz/fuzz_hpack_decoder.mojo"    # v0.6 Track J — HPACK decoder (200K)
fuzz-huffman-simd  = "mojo -I . fuzz/fuzz_huffman_simd.mojo"     # v0.7 — differential SIMD vs scalar Huffman parity (200K)
fuzz-ws-deflate    = "mojo -I . fuzz/fuzz_ws_deflate.mojo"       # v0.7 — WS permessage-deflate codec round-trip + cap honesty (200K)
fuzz-extended-connect = "mojo -I . fuzz/fuzz_extended_connect.mojo"  # RFC 8441 Extended CONNECT dispatch + SETTINGS latch (200K)
fuzz-h2-preface-peek = "mojo -I . fuzz/fuzz_h2_preface_peek.mojo"   # PendingConnHandle preface-peek classification (200K)
fuzz-h2-continuation = "mojo -I . fuzz/fuzz_h2_continuation.mojo" # v0.7 — CONTINUATION-flood state-machine harness (RFC 9113 §4.3, 200K)
fuzz-h2-rapid-reset = "mojo -I . fuzz/fuzz_h2_rapid_reset.mojo"   # v0.7 — RAPID-RESET state-machine harness (CVE-2023-44487, 200K)
fuzz-proxy-protocol = "mojo -I . fuzz/fuzz_proxy_protocol.mojo"  # HAProxy PROXY v1+v2 parser (200K)
fuzz-io-uring-sqe   = "mojo -I . fuzz/fuzz_io_uring_sqe.mojo"     # io_uring SQE encoder + CQE decoder primitives (200K, codec only — no kernel involved)
fuzz-uring-reactor  = "mojo -I . fuzz/fuzz_uring_reactor.mojo"    # UringReactor pack/unpack user_data + cancel-surface stability (100K, kernel-touch when io_uring is available)
fuzz-grpc-lpm-decoder = "mojo -I . fuzz/fuzz_grpc_lpm_decoder.mojo"  # v0.8 — gRPC LPM (length-prefixed message) byte-level decoder (200K)
fuzz-quic-varint   = "mojo -I . fuzz/fuzz_quic_varint.mojo"        # v0.8 — QUIC varint codec, canonical round-trip + non-shortest accept (200K)
fuzz-quic-long-header = "mojo -I . fuzz/fuzz_quic_long_header.mojo"  # v0.8 — QUIC long-header public-prefix parser (200K)
fuzz-h3-frame      = "mojo -I . fuzz/fuzz_h3_frame.mojo"            # v0.8 — HTTP/3 frame codec + SETTINGS payload round-trip (200K)
fuzz-quic-frame-decode    = "mojo -I . fuzz/fuzz_quic_frame_decode.mojo"     # RFC 9000 §19 frame codec safety + idempotence (200K)
fuzz-qpack-decode         = "mojo -I . fuzz/fuzz_qpack_decode.mojo"          # RFC 9204 static-only decoder + round-trip (200K)
fuzz-quic-transport-params = "mojo -I . fuzz/fuzz_quic_transport_params.mojo"# RFC 9000 §18 transport-parameter codec round-trip + reject (200K)
fuzz-quic-packet-decrypt = "mojo -I . fuzz/fuzz_quic_packet_decrypt.mojo"   # RFC 9001 §5.3 AEAD open + HP mask safety on random bytes (200K)
fuzz-cache-control-parser = "mojo -I . fuzz/fuzz_cache_control_parser.mojo"  # v0.8 — RFC 9111 §5.2 Cache-Control directive parser (200K)
fuzz-all           = { depends-on = ["fuzz-ws", "fuzz-pmd-context", "fuzz-url", "fuzz-headers", "fuzz-http-response", "fuzz-http-server", "fuzz-ws-server", "prop-ws", "prop-headers", "prop-auth", "fuzz-encoding", "fuzz-cookie", "fuzz-reactor-churn", "prop-timer-wheel", "fuzz-server-reactor-chunks", "fuzz-router-paths", "fuzz-scheduler-shutdown", "fuzz-extractors", "fuzz-routes-comptime", "fuzz-header-scan", "fuzz-form", "fuzz-multipart", "fuzz-session-decode", "fuzz-fs-range", "fuzz-h2-frame", "fuzz-hpack-decoder", "fuzz-huffman-simd", "fuzz-ws-deflate", "fuzz-extended-connect", "fuzz-h2-preface-peek", "fuzz-h2-continuation", "fuzz-h2-rapid-reset", "fuzz-proxy-protocol", "fuzz-io-uring-sqe", "fuzz-uring-reactor", "fuzz-grpc-lpm-decoder", "fuzz-quic-varint", "fuzz-quic-long-header", "fuzz-h3-frame", "fuzz-cache-control-parser", "fuzz-quic-frame-decode", "fuzz-qpack-decode", "fuzz-quic-transport-params", "fuzz-quic-packet-decrypt"] }

[feature.dev.tasks]
# ── Docs (powered by mojodoc; dev-only because mojodoc is in feature.dev) ────
# docs:       build + serve at http://localhost:3000/flare/ (blocks terminal)
# docs-build: build static HTML → target/doc/ (for CI / GitHub Pages)
# Run with: pixi run -e dev <task>
docs       = "mojodoc ./flare --open"
docs-build = "mojodoc ./flare --out-dir target/doc --base-url /flare/"

# ── Format hook (dev-only because it wires pre-commit into .git/hooks) ──────
# `format` shells out to `mojo format`, which is available in the lean
# default env too — but we intentionally gate it on dev so every
# `pixi run -e dev format` also installs the git pre-commit hook for the
# contributor. Use `pixi run format-check` (below, in [tasks]) for a
# read-only CI-style check that runs without feature.dev.
install-pre-commit = "pre-commit install"
format             = { cmd = "mojo format flare tests benchmark examples fuzz", depends-on = ["install-pre-commit"] }

# ── Allocation + CPU profile of the bench server ────────────────────────
# Runs heaptrack + ``strace -c`` (alloc syscalls only) + ``perf record``
# against ``benchmark/bench_server.mojo`` while ``wrk`` hammers it.
# Reproduces the v0.8 deep-perf measurement that surfaced + fixed the
# ``_is_valid_utf8_runtime`` 5%-of-CPU hot spot on the H1 plaintext
# path (commit 6e44e63); rerunning against a future flare build makes
# any allocation-pattern or CPU-profile regression on the hot path
# visible at a glance. Outputs land under ``build/perf-profile/``.
# Linux-only — depends on ``valgrind`` + ``heaptrack`` from
# ``[feature.dev.target.linux-64.dependencies]`` and system-level
# ``wrk`` + ``perf`` + ``strace``. See
# ``benchmark/scripts/perf_profile_server.sh`` for the orchestration
# details + the healthy-posture interpretation guide.
perf-server-alloc  = "bash benchmark/scripts/perf_profile_server.sh"

[environments]
# Lean default env — only flare's runtime deps. Ships tests, examples,
# microbenchmarks, and format-check out of the box. Contributors who
# need mojodoc / pre-commit should use `-e dev`.
default = { solve-group = "default" }
dev     = { features = ["dev"], solve-group = "default" }
fuzz    = { features = ["dev", "fuzz"], solve-group = "default" }
bench   = { features = ["dev", "bench"], solve-group = "default" }

[tasks]
# ── Lint jobs (load-bearing for the sans-I/O sublayer + future API surface) ──
# check-sans-io: enforces that every file registered in
#                tools/check_sans_io.sh has zero imports from the I/O-bearing
#                subsystems (flare.runtime / flare.io / flare.tcp / udp / uds
#                / flare.tls / flare.net). Cheap, runs in milliseconds, fits
#                inside the per-commit gate.
check-sans-io   = "bash tools/check_sans_io.sh"
# check-reactor-size: enforces the 600-line cap on every file under
#                flare/http/_reactor/. The cap guards the v0.8 reactor
#                decomposition gain; offenders are either split or
#                explicitly allowlisted with a documented split plan.
check-reactor-size = "bash tools/check_reactor_size.sh"
# check-no-http-http2-cycle: enforces that flare/http2/** and flare/h3/**
#                only reach into flare.http via the neutral re-export
#                layer at flare.http.wire (and the codec namespace at
#                flare.http.proto). Stops the layering drift that put
#                Request / Response / HeaderMap / Method back on the
#                cyclic edge between h1 and h2.
check-no-http-http2-cycle = "bash tools/check_no_http_http2_cycle.sh"

# ── Tests (flat files, one file per test suite) ───────────────────────────────
# Each task runs a single test file; use 'pixi run tests' to run all.
# All test/example/microbench tasks work under the lean default env —
# they only need the base `mojo` compiler + runtime deps.
test-proto-reexports = "mojo -I . tests/http/test_proto_reexports.mojo"  # ``flare.http.proto`` sans-I/O namespace re-export regression (~10 cases)
test-wire-reexports  = "mojo -I . tests/http/test_wire_reexports.mojo"   # ``flare.http.wire`` neutral re-export layer regression (~5 cases)
test-stream-slab     = "mojo -I . tests/http2/test_stream_slab.mojo"     # HTTP/2 stream slab (fast-path List[Optional[Stream]] + overflow Dict) (~10 cases)
test-h1-leniency     = "mojo -I . tests/http/test_h1_leniency.mojo"      # ``_ExperimentalH1LeniencyConfig`` named-flag carrier surface (~5 cases)
test-conformance-h1  = "mojo -I . tests/conformance/test_conformance_h1.mojo"  # H1 wire-grammar fixtures under ``conformance/h1/`` (~10 cases)
test-quic-varint     = "mojo -I . tests/quic/test_varint.mojo"           # RFC 9000 §16 variable-length integer codec (~12 cases)
test-quic-packet     = "mojo -I . tests/quic/test_packet.mojo"           # RFC 9000 §17 long/short packet header codec (~11 cases)
test-quic-frame      = "mojo -I . tests/quic/test_frame.mojo"            # RFC 9000 §19 transport-frame codec, all 22 frame types (~26 cases)
test-quic-transport-params = "mojo -I . tests/quic/test_transport_params.mojo"  # RFC 9000 §18 transport-parameter codec (~10 cases)
test-quic-cc         = "mojo -I . tests/quic/test_cc.mojo"               # RFC 9438 CUBIC + RFC 9002 §7.7 pacing + RFC 9406 HyStart++ (~11 cases)
test-quic-cc-trait   = "mojo -I . tests/quic/test_cc_trait.mojo"         # CongestionController trait + Reno fallback (~10 cases)
test-quic-crypto     = "mojo -I . tests/quic/test_crypto.mojo"           # RFC 9001 §5.2 initial-secret HKDF math + QuicCrypto trait surface (~11 cases)
test-quic-aead-ffi   = "mojo -I . tests/quic/test_aead_ffi.mojo"         # RFC 9001 §5.3 AEAD FFI round-trip + tamper-detection (10 cases)
test-quic-hp-mask-ffi = "mojo -I . tests/quic/test_hp_mask_ffi.mojo"     # RFC 9001 §5.4 HP mask FFI vs Appendix A.2 + A.5 vectors (5 cases)
test-openssl-quic-crypto = "mojo -I . tests/quic/test_openssl_quic_crypto.mojo"  # OpenSslQuicCrypto trait surface: derive_packet_keys (RFC 9001 §5.1) + 3-cipher round-trip + HP mask (9 cases)
test-quic-rfc9001-appendix-a = "mojo -I . tests/quic/test_rfc9001_appendix_a.mojo"  # RFC 9001 Appendix A.1-A.3 byte-exact conformance vectors (6 cases)
# Build the rustls QUIC cdylib (libflare_rustls_quic.so) via cargo.
# Idempotent: cargo's incremental build skips unchanged sources.
# Track Q2-W commit 2/4 wires this into [activation] scripts so
# `pixi install` auto-builds the .so the same way it auto-builds
# libflare_tls.so today.
build-rustls-quic    = "cargo build --release --locked --manifest-path flare/tls/ffi/rustls_wrapper/Cargo.toml"
test-rustls-quic-crate-smoke = { cmd = "mojo -I . tests/tls/test_rustls_quic_crate_smoke.mojo", depends-on = ["build-rustls-quic"] }  # rustls cdylib link + abi_version + empty-PEM rejection (2 cases)
test-rustls-quic     = "mojo -I . tests/tls/test_rustls_quic.mojo"       # flare.tls.rustls_quic scaffold -- carrier + level + error enum (~12 cases)
